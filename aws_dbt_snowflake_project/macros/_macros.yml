version: 2

macros:
  - name: multiply
    description: "Multiplies two numbers and rounds the result to a specified precision."
    arguments:
      - name: x
        type: numeric
        description: "The first number to multiply."
      - name: y
        type: numeric
        description: "The second number to multiply."
      - name: precision
        type: integer
        description: "Number of decimal places to round to. Defaults to 2."

  - name: tag
    description: "Categorizes a numeric column value into 'low', 'medium', or 'high' tiers."
    arguments:
      - name: col
        type: numeric
        description: "The column or value to evaluate."

  - name: trimmer
    description: "Trims whitespace and converts a column name or string to uppercase."
    arguments:
      - name: column_name
        type: string
        description: "The string or column name to trim and convert to uppercase."
      - name: node
        type: object
        description: "The dbt node context."
