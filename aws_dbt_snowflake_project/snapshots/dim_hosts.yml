snapshots:
  - name: dim_hosts
    description: "SCD Type 2 snapshot table for tracking historical changes to hosts."
    relation: ref('hosts')
    config:
      schema: gold
      database: AIRBNB
      unique_key: HOST_ID
      strategy: timestamp
      updated_at: '"Created_at"'
      dbt_valid_to_current: "'2099-01-01'"
