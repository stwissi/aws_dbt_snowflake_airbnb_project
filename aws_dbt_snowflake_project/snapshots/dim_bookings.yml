snapshots:
  - name: dim_bookings
    description: "SCD Type 2 snapshot table for tracking historical changes to bookings."
    relation: ref('bookings')
    config:
      schema: gold
      database: AIRBNB
      unique_key: BOOKING_ID
      strategy: timestamp
      updated_at: CREATED_AT
      dbt_valid_to_current: "'2099-01-01'"
