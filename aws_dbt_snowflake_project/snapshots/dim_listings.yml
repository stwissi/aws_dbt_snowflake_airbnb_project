snapshots:
  - name: dim_listings
    description: "SCD Type 2 snapshot table for tracking historical changes to listings."
    relation: ref('listings')
    config:
      schema: gold
      database: AIRBNB
      unique_key: LISTING_ID
      strategy: timestamp
      updated_at: CREATED_AT
      dbt_valid_to_current: "'2099-01-01'"
